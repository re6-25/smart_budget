name: smart_budget
description: "الميزانية الذكية - تطبيق احترافي لإدارة الميزانية الشخصية"
publish_to: 'none'
version: 1.0.0+1
environment:
  sdk: ^3.10.3
dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  # Database (cross-platform: Android, iOS, Web)
  hive_flutter: ^1.1.0
  # State Management
  provider: ^6.1.2
  # Charts
  fl_chart: ^0.69.0
  # Internationalization
  intl: ^0.20.2
  # PDF & Printing
  pdf: ^3.11.1
  printing: ^5.13.2
  # Image Picker (Invoice capture)
  image_picker: ^1.1.2
  # Notifications
  flutter_local_notifications: ^18.0.1
  # File system
  path_provider: ^2.1.3
  # Share exports
  share_plus: ^10.1.3
  # Fonts
  google_fonts: ^6.2.1
  # Swipe gestures
  flutter_slidable: ^3.1.1
  # Permissions
  permission_handler: ^11.3.1
  # Icons
  cupertino_icons: ^1.0.8
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
flutter:
  uses-material-design: true
  # google_fonts loads Tajawal at runtime — no local font files needed
